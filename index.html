          <!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Taste of Desi Milk</title>

<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 p-5">

<h1 class="text-2xl font-bold mb-4">Taste of Desi Milk</h1>

<!-- Products -->
<div id="products"></div>

<!-- Customer Details -->
<div class="mt-6 bg-white p-4 rounded shadow">
    <h2 class="font-bold mb-2">Delivery Details</h2>
    <input id="name" placeholder="Name" class="border p-2 w-full mb-2">
    <input id="phone" placeholder="Phone" class="border p-2 w-full mb-2">
    <textarea id="address" placeholder="Address" class="border p-2 w-full mb-2"></textarea>
</div>

<!-- Payment Options -->
<div class="mt-4 bg-white p-4 rounded shadow">
    <h2 class="font-bold mb-2">Payment Method</h2>

    <label class="block">
        <input type="radio" name="payment" value="cod" checked> COD (Pay on Delivery)
    </label>

    <label class="block">
        <input type="radio" name="payment" value="phonepe"> PhonePe / UPI
    </label>
</div>

<!-- Order Summary -->
<div class="mt-4 bg-white p-4 rounded shadow">
    <h2 class="font-bold mb-2">Order Summary</h2>
    <div id="summary"></div>

    <button onclick="placeOrder()" class="mt-4 bg-green-500 text-white px-4 py-2 rounded">
        Place Order
    </button>
</div>

<script>
const products = [
    {id:'milk', name:'Milk', price:90},
    {id:'curd', name:'Curd', price:120}
];

let cart = {
    milk:0,
    curd:0
};

// Render Products
function renderProducts(){
    let html="";
    products.forEach(p=>{
        html += `
        <div class="bg-white p-4 mb-2 rounded shadow flex justify-between">
            <span>${p.name} ₹${p.price}</span>
            <div>
                <button onclick="updateQty('${p.id}',-1)">-</button>
                <span id="qty_${p.id}">0</span>
                <button onclick="updateQty('${p.id}',1)">+</button>
            </div>
        </div>`;
    });
    document.getElementById("products").innerHTML=html;
}

function updateQty(id,val){
    cart[id]+=val;
    if(cart[id]<0) cart[id]=0;
    document.getElementById("qty_"+id).innerText=cart[id];
    updateSummary();
}

function updateSummary(){
    let html="";
    let total=0;

    products.forEach(p=>{
        let qty=cart[p.id];
        if(qty>0){
            let cost=qty*p.price;
            total+=cost;
            html += `<p>${p.name} x ${qty} = ₹${cost}</p>`;
        }
    });

    html += `<hr>Total: ₹${total}`;
    document.getElementById("summary").innerHTML=html;
}

// Get Payment Method
function getPayment(){
    let p=document.querySelector('input[name="payment"]:checked');
    return p.value;
}

// Place Order
function placeOrder(){

    let name=document.getElementById("name").value;
    let phone=document.getElementById("phone").value;
    let address=document.getElementById("address").value;

    if(!name || !phone || !address){
        alert("Fill all details");
        return;
    }

    let payment=getPayment();

    let msg=`New Order\nName:${name}\nPhone:${phone}\nAddress:${address}\n`;

    let total=0;
    products.forEach(p=>{
        if(cart[p.id]>0){
            let cost=cart[p.id]*p.price;
            total+=cost;
            msg+=`${p.name} x ${cart[p.id]} = ₹${cost}\n`;
        }
    });

    if(total===0){
        alert("Cart empty");
        return;
    }

    msg+=`Total: ₹${total}\nPayment:${payment.toUpperCase()}`;

    // PHONEPE / UPI
    if(payment==="phonepe"){
        let upi="9704016047@ybl"; // CHANGE THIS
        let upiUrl=`upi://pay?pa=${upi}&pn=DesiMilk&am=${total}&cu=INR`;

        window.open(upiUrl,"_blank");

        msg+=`\nPayment via UPI (user will confirm)`;
    }

    // WhatsApp
    let number="919100604776";
    let url=`https://wa.me/${number}?text=${encodeURIComponent(msg)}`;

    window.open(url,"_blank");
}

renderProducts();
updateSummary();
</script>

</body>
</html>
